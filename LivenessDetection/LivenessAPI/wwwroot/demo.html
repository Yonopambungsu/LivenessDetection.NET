<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- ===== Structured Data (JSON-LD) — bantu Google pahami konten ===== -->
    <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "SoftwareApplication",
          "name": "Liveness Detection .NET",
          "applicationCategory": "SecurityApplication",
          "operatingSystem": "Web",
          "description": "Verifikasi liveness detection berbasis AI dengan deteksi kedipan mata, senyum, dan gerakan kepala untuk mencegah spoofing wajah.",
          "url": "http://yoono.tryasp.net/demo.html",
          "inLanguage": "id"
        }
    </script>

    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --panel-border: #2a2f3a;
            --text: #e6e8ec;
            --muted: #9aa2af;
            --accent: #4f8cff;
            --good: #2fbf71;
            --bad: #e5484d;
            --warn: #e0a326;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 24px 16px 80px;
        }

        main {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 4px;
        }

        p.sub {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
        }

            .card h2 {
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--muted);
                margin: 0 0 12px;
            }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

            button.secondary {
                background: transparent;
                border: 1px solid var(--panel-border);
                color: var(--text);
            }

            button:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

        input[type="file"] {
            color: var(--muted);
            font-size: 13px;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: black;
            border-radius: 10px;
            overflow: hidden;
        }

        video, #refPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
            text-align: center;
            font-size: 20px;
            font-weight: 700;
        }

            .overlay small {
                display: block;
                font-weight: 400;
                font-size: 13px;
                color: #d8dbe2;
                margin-top: 4px;
            }

        .ref-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .ref-thumb {
            width: 96px;
            height: 96px;
            border-radius: 8px;
            background: #000 center/cover no-repeat;
            border: 1px solid var(--panel-border);
            flex-shrink: 0;
        }

        #log {
            max-height: 160px;
            overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--muted);
            display: flex;
            flex-direction: column-reverse;
        }

            #log .ok {
                color: var(--good);
            }

            #log .warn {
                color: var(--warn);
            }

            #log .err {
                color: var(--bad);
            }

        .result {
            display: none;
            text-align: center;
            padding: 24px 16px;
        }

            .result.show {
                display: block;
            }

            .result.success {
                border-color: var(--good);
            }

            .result.failure {
                border-color: var(--bad);
            }

            .result h2 {
                font-size: 22px;
                margin: 0 0 8px;
                color: var(--text);
                text-transform: none;
                letter-spacing: 0;
            }

            .result.success h2 {
                color: var(--good);
            }

            .result.failure h2 {
                color: var(--bad);
            }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: var(--panel-border);
            color: var(--muted);
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Liveness Detection .NET</h1>
            <p class="sub">Github <a href="https://github.com/Yonopambungsu/LivenessDetection.NET" target="_blank" rel="noopener noreferrer" style="color: #1da1f2;">Liveness Detection .NET</a></p>
        </header>

        <section class="card" id="cameraCard" aria-labelledby="cameraHeading">
            <h2 id="cameraHeading">1. Kamera</h2>
            <div class="video-wrap">
                <video id="video" autoplay playsinline muted></video>
                <div class="overlay" id="overlay" style="display:none;">
                    <span id="challengeText">-</span>
                    <small id="challengeSub"></small>
                </div>
            </div>
            <div class="row" style="margin-top:12px;">
                <button id="btnStartCam">Aktifkan Kamera</button>
            </div>
        </section>

        <section class="card" id="refCard" aria-labelledby="refHeading">
            <h2 id="refHeading">2. Foto Referensi</h2>
            <div class="ref-row">
                <div class="ref-thumb" id="refThumb" role="img" aria-label="Pratinjau foto referensi wajah"></div>
                <div class="row">
                    <button id="btnCaptureRef" class="secondary" disabled>Ambil dari Kamera</button>
                    <label class="secondary" style="border:1px solid var(--panel-border); border-radius:8px; padding:10px 16px; cursor:pointer;">
                        Upload File
                        <input id="refFile" type="file" accept="image/*" style="display:none;" />
                    </label>
                </div>
            </div>
        </section>

        <section class="card" aria-labelledby="verifyHeading">
            <h2 id="verifyHeading">3. Verifikasi</h2>
            <div class="row">
                <button id="btnStart" disabled>Mulai Verifikasi</button>
                <button id="btnStop" class="secondary" disabled>Hentikan</button>
                <button id="btnReset" class="secondary">Reset</button>
            </div>
        </section>

        <section class="card result" id="resultCard">
            <h2 id="resultTitle">-</h2>
            <p id="resultDetail" class="sub"></p>
        </section>

        <section class="card" aria-labelledby="logHeading">
            <h2 id="logHeading">Log</h2>
            <div id="log"></div>
        </section>
    </main>

    <script>
        const CHALLENGE_LABELS = {
            Blink: ['Silakan berkedip', 'Kedipkan mata Anda secara normal'],
            Smile: ['Silakan tersenyum', 'Berikan senyuman lebar'],
            LookLeft: ['Tolehkan kepala ke kiri', 'Putar kepala perlahan ke arah kiri'],
            LookRight: ['Tolehkan kepala ke kanan', 'Putar kepala perlahan ke arah kanan'],
        };

        const FRAME_INTERVAL_MS = 400;
        const JPEG_QUALITY = 0.8;

        const els = {
            video: document.getElementById('video'),
            overlay: document.getElementById('overlay'),
            challengeText: document.getElementById('challengeText'),
            challengeSub: document.getElementById('challengeSub'),
            btnStartCam: document.getElementById('btnStartCam'),
            btnCaptureRef: document.getElementById('btnCaptureRef'),
            refFile: document.getElementById('refFile'),
            refThumb: document.getElementById('refThumb'),
            btnStart: document.getElementById('btnStart'),
            btnStop: document.getElementById('btnStop'),
            btnReset: document.getElementById('btnReset'),
            resultCard: document.getElementById('resultCard'),
            resultTitle: document.getElementById('resultTitle'),
            resultDetail: document.getElementById('resultDetail'),
            log: document.getElementById('log'),
        };

        const state = {
            stream: null,
            referenceDataUrl: null,
            sessionId: null,
            timerId: null,
            busy: false,
        };

        function log(message, level) {
            const line = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            line.className = level || '';
            line.textContent = `[${time}] ${message}`;
            els.log.prepend(line);
        }

        function captureFrameDataUrl() {
            const canvas = document.createElement('canvas');
            canvas.width = els.video.videoWidth;
            canvas.height = els.video.videoHeight;
            canvas.getContext('2d').drawImage(els.video, 0, 0);
            return canvas.toDataURL('image/jpeg', JPEG_QUALITY);
        }

        function setChallenge(challenge) {
            if (!challenge) {
                els.overlay.style.display = 'none';
                return;
            }
            const [title, sub] = CHALLENGE_LABELS[challenge] || [challenge, ''];
            els.challengeText.textContent = title;
            els.challengeSub.textContent = sub;
            els.overlay.style.display = 'block';
        }

        function showResult(kind, title, detail) {
            els.resultCard.className = `card result show ${kind}`;
            els.resultTitle.textContent = title;
            els.resultDetail.textContent = detail || '';
        }

        function hideResult() {
            els.resultCard.className = 'card result';
        }

        async function startCamera() {
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                els.video.srcObject = state.stream;
                els.btnStartCam.disabled = true;
                els.btnStartCam.textContent = 'Kamera Aktif';
                els.btnCaptureRef.disabled = false;
                log('Kamera aktif.', 'ok');
            } catch (err) {
                log('Gagal mengakses kamera: ' + err.message, 'err');
            }
        }

        function setReferenceFromDataUrl(dataUrl) {
            state.referenceDataUrl = dataUrl;
            els.refThumb.style.backgroundImage = `url(${dataUrl})`;
            els.btnStart.disabled = false;
            log('Foto referensi siap.', 'ok');
        }

        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function startSession() {
            hideResult();
            els.btnStart.disabled = true;
            try {
                const res = await fetch('/api/liveness/session/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ referenceImageBase64: state.referenceDataUrl }),
                });
                const data = await res.json();
                if (!res.ok) {
                    log('Gagal memulai sesi: ' + (data.error || res.status), 'err');
                    els.btnStart.disabled = false;
                    return;
                }
                state.sessionId = data.sessionId;
                log(`Sesi dimulai: ${data.sessionId}`, 'ok');
                setChallenge(data.currentChallenge);
                els.btnStop.disabled = false;
                startLoop();
            } catch (err) {
                log('Network error: ' + err.message, 'err');
                els.btnStart.disabled = false;
            }
        }

        function startLoop() {
            stopLoop();
            state.timerId = setInterval(submitFrame, FRAME_INTERVAL_MS);
        }

        function stopLoop() {
            if (state.timerId) {
                clearInterval(state.timerId);
                state.timerId = null;
            }
            els.btnStop.disabled = true;
        }

        async function submitFrame() {
            if (state.busy || !state.sessionId) return;
            state.busy = true;
            try {
                const frame = captureFrameDataUrl();
                const res = await fetch(`/api/liveness/session/${state.sessionId}/frame`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: frame }),
                });
                const data = await res.json();

                if (!res.ok) {
                    log(data.error || `HTTP ${res.status}`, 'warn');
                    return;
                }

                setChallenge(data.currentChallenge);
                log(`${data.status}: ${data.message}`);

                if (data.status === 'Success') {
                    stopLoop();
                    setChallenge(null);
                    const pct = data.similarity != null ? (data.similarity * 100).toFixed(1) + '%' : '-';
                    showResult('success', 'Verifikasi Berhasil', `Kemiripan wajah: ${pct}`);
                } else if (data.status === 'Failed' || data.status === 'Expired') {
                    stopLoop();
                    setChallenge(null);
                    showResult('failure', data.status === 'Expired' ? 'Sesi Kedaluwarsa' : 'Verifikasi Gagal', data.message);
                }
            } catch (err) {
                log('Network error: ' + err.message, 'err');
            } finally {
                state.busy = false;
            }
        }

        function resetAll() {
            stopLoop();
            state.sessionId = null;
            els.btnStart.disabled = !state.referenceDataUrl;
            setChallenge(null);
            hideResult();
            log('Direset.');
        }

        els.btnStartCam.addEventListener('click', startCamera);
        els.btnCaptureRef.addEventListener('click', () => setReferenceFromDataUrl(captureFrameDataUrl()));
        els.refFile.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setReferenceFromDataUrl(await fileToDataUrl(file));
        });
        els.btnStart.addEventListener('click', startSession);
        els.btnStop.addEventListener('click', () => { stopLoop(); log('Dihentikan oleh user.', 'warn'); });
        els.btnReset.addEventListener('click', resetAll);
    </script>
</body>
</html>
